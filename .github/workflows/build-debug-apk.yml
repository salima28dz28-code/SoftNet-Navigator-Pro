name: Build SoftNet Navigator Pro - Debug APK

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Create required stub resource directories
      run: |
        mkdir -p ../resources/voice
        mkdir -p ../resources/rendering_styles/fonts
        mkdir -p ../resources/proj
        mkdir -p ../resources/color-palette
        mkdir -p ../resources/routing
        mkdir -p ../resources/obf_creation
        mkdir -p ../resources/poi
        mkdir -p ../resources/rendering_styles
        mkdir -p ../resources/test-resources/search
        mkdir -p ../resources/test-resources/routing
        mkdir -p ../resources/test-resources/approximation
        echo '{}' > ../resources/bundled_assets.json
        echo '<resources/>' > ../resources/poi/poi_types.xml
        echo '{}' > ../resources/poi/activities.json
        touch ../resources/proj/proj.db
        echo '<resources/>' > ../resources/obf_creation/rendering_types.xml

    - name: Patch gradle.properties
      run: |
        printf "\norg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8\n" >> gradle.properties
        printf "org.gradle.daemon=false\n" >> gradle.properties
        printf "org.gradle.parallel=true\n" >> gradle.properties
        printf "org.gradle.caching=true\n" >> gradle.properties
        printf "osmandCoreSimple=true\n" >> gradle.properties

    - name: Build Debug APK
      run: |
        ./gradlew :SoftNet_Navigator_Pro:assembleNightlyFreeLegacyFatDebug \
          --no-daemon \
          --info \
          -x test \
          -x lint \
          -x validateTranslations \
          -x downloadWorldMiniBasemap \
          -x downloadWorldMiniBasemapAnt \
          -x downloadStarsDb \
          -x collectVoiceAssets \
          -x :SoftNet_Navigator_Pro-java:collectRegionsInfoResources \
          -x :SoftNet_Navigator_Pro-java:collectTestResources \
          -x :SoftNet_Navigator_Pro-java:collectTestPhrasesResources

    - name: Find all APK files
      run: |
        echo "=== Searching for APK files ==="
        find . -name "*.apk" -type f 2>/dev/null
        echo "=== Build output directory ==="
        find . -path "*/build/outputs*" -type f 2>/dev/null | head -30
        echo "=== Listing SoftNet_Navigator_Pro/build ==="
        ls -la SoftNet_Navigator_Pro/build/outputs/apk/ 2>/dev/null || echo "APK output dir not found"

    - name: Get commit hash
      id: commit
      run: echo "hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: SoftNet-Navigator-Pro-debug-${{ steps.commit.outputs.hash }}
        path: |
          SoftNet_Navigator_Pro/build/outputs/apk/**/*.apk
          **/build/outputs/apk/**/*.apk
        retention-days: 30
        if-no-files-found: warn
