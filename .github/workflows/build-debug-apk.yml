name: Build SoftNet Navigator Pro - Debug APK

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
    - name: Checkout SoftNet_Navigator_Pro
      uses: actions/checkout@v4
      with:
        path: android

    - name: Checkout OsmAnd-resources
      uses: actions/checkout@v4
      with:
        repository: osmandapp/OsmAnd-resources
        path: resources

    - name: Checkout OsmAnd-core-legacy
      uses: actions/checkout@v4
      with:
        repository: osmandapp/OsmAnd-core-legacy
        path: core-legacy

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant execute permission for gradlew
      working-directory: ./android
      run: chmod +x gradlew

    - name: Patch memory requirements
      working-directory: ./android
      run: |
        printf "\norg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8\n" >> gradle.properties
        printf "org.gradle.daemon=false\n" >> gradle.properties
        printf "org.gradle.parallel=true\n" >> gradle.properties
        printf "org.gradle.caching=true\n" >> gradle.properties

    - name: Build Debug APK
      working-directory: ./android
      run: |
        ./gradlew :SoftNet_Navigator_Pro:assembleNightlyFreeLegacyFatDebug \
          --no-daemon \
          --stacktrace \
          -x test \
          -x lint

    - name: Find APK
      working-directory: ./android
      run: find . -name "*.apk" -type f

    - name: Get commit hash
      working-directory: ./android
      id: commit
      run: echo "hash=$(git rev-parse --short HEAD 2>/dev/null || echo 'build')" >> $GITHUB_OUTPUT

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: SoftNet-Navigator-Pro-debug-${{ steps.commit.outputs.hash }}
        path: android/SoftNet_Navigator_Pro/build/outputs/apk/**/*.apk
        retention-days: 30
        if-no-files-found: warn
